name: aqua_rythu
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.5.0
  cupertino_icons: ^1.0.6
  sms_autofill: ^2.4.1
  flutter_riverpod: ^2.6.1
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  lottie: ^3.1.0
  url_launcher: ^6.3.0
  razorpay_flutter: ^1.3.6
  path_provider: ^2.1.2
  firebase_core: ^2.32.0
  firebase_crashlytics: ^3.5.7
  firebase_analytics: ^10.10.7
  connectivity_plus: ^6.1.0
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.5
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/appicon.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
